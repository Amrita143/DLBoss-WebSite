      - generic [ref=e129]: HISTORY OF SATTA MATKA
      - paragraph [ref=e131]:
        - text: The history of Satta Matka dates to the 1960s when it originated as a form of gambling in Mumbai, India. Initially, it involved betting on the opening and closing rates of cotton in the Bombay cotton exchange. The practice of placing bets on the fluctuating cotton rates attracted a significant number of people looking to try their luck.
        - text: As the popularity of this form of gambling grew, it expanded beyond the cotton exchange. The game underwent several modifications and evolved into a numbers-based betting system. Players began betting on random numbers ranging from 0 to 9, which were drawn from a Matka (earthen pot).
        - text: Along with time various Matka Markets came out known as Kalyan Matka, Mumbai Matka, Rajdhani Matka, Night Milan Matka, And Main Mumbai Matka, among others. Every market has their own set of rules and draws which provides player with different opportunities in the game.
